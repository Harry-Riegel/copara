<!-- @dsCard group="Colors" viewport="700x170" name="Semantik — niemals Rot" subtitle="Success Wald, Warning Amber, Error muted Clay — Premium-Gold nur für Premium" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--sand-50); font-family: var(--font-body); }
  .wrap { padding: 24px 28px; display: flex; gap: 12px; }
  .sw { flex: 1; height: 84px; border-radius: 14px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; box-sizing: border-box; color: #fff; }
  .n { font-size: 12px; font-weight: 600; }
  .h { font-size: 10px; opacity: .85; font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="wrap">
  <div class="sw" style="background:var(--success-500)"><span class="n">Success</span><span class="h">#3E6553</span></div>
  <div class="sw" style="background:var(--amber-500)"><span class="n">Warning</span><span class="h">#C4956A</span></div>
  <div class="sw" style="background:var(--clay-500)"><span class="n">Error · Clay</span><span class="h">#B07060</span></div>
  <div class="sw" style="background:var(--premium-gradient);color:var(--gold-900)"><span class="n">Premium-Gold</span><span class="h">#C67E5C → #D9B36A</span></div>
</div>
</body>
</html>
