<!-- @dsCard group="Spacing" viewport="700x190" name="Radien & Schatten" subtitle="12 / 16 / 24 / 32 / Pille — warm getönte Soft-Schatten, Schatten ODER Hairline" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--sand-50); font-family: var(--font-body); }
  .wrap { padding: 24px 28px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .r { width: 78px; height: 78px; background: var(--sand-0); border: 1px solid var(--sand-200); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; box-sizing: border-box; font-size: 11px; color: var(--ink-600); }
  .pill { width: 110px; height: 44px; border-radius: 999px; background: var(--wald-700); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .sep { width: 1px; height: 78px; background: var(--sand-200); }
  .card { width: 120px; height: 78px; background: var(--sand-0); border-radius: 24px; box-shadow: var(--shadow-card); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; box-sizing: border-box; font-size: 11px; color: var(--ink-600); }
</style>
</head>
<body>
<div class="wrap">
  <div class="r" style="border-radius:12px">sm 12</div>
  <div class="r" style="border-radius:16px">md 16</div>
  <div class="r" style="border-radius:24px">lg 24</div>
  <div class="r" style="border-radius:32px 32px 0 0">xl 32</div>
  <div class="pill">Pille</div>
  <div class="sep"></div>
  <div class="card">--shadow-card</div>
</div>
</body>
</html>
