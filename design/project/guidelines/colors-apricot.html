<!-- @dsCard group="Colors" viewport="700x150" name="Aprikose — Akzent / Elternteil B" subtitle="Wärmt: Elternteil B, offene Anfragen, Basis des Premium-Golds" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--sand-50); font-family: var(--font-body); }
  .row { display: flex; gap: 0; padding: 26px 28px; }
  .sw { flex: 1; height: 76px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; box-sizing: border-box; }
  .sw:first-child { border-radius: 12px 0 0 12px; }
  .sw:last-child { border-radius: 0 12px 12px 0; }
  .n { font-size: 11px; font-weight: 600; }
  .h { font-size: 10px; opacity: .82; font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:var(--apricot-100);color:var(--apricot-700)"><span class="n">100</span><span class="h">#F4E2D5</span></div>
  <div class="sw" style="background:var(--apricot-300);color:var(--apricot-700)"><span class="n">300</span><span class="h">#DDA98C</span></div>
  <div class="sw" style="background:var(--apricot-500);color:#fff"><span class="n">500 · Akzent</span><span class="h">#C67E5C</span></div>
  <div class="sw" style="background:var(--apricot-700);color:#fff"><span class="n">700</span><span class="h">#8A4E33</span></div>
</div>
</body>
</html>
