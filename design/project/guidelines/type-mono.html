<!-- @dsCard group="Type" viewport="700x150" name="Mono — JetBrains Mono" subtitle="Einladungs-Codes und Zeitstempel des Aktivitäts-Logs" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--sand-50); font-family: var(--font-body); }
  .wrap { padding: 26px 28px; display: flex; align-items: center; gap: 32px; }
  .code { font-family: var(--font-mono); font-size: 30px; font-weight: 400; letter-spacing: .16em; color: var(--wald-700); background: var(--wald-100); border-radius: 12px; padding: 10px 18px; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .ts { font-family: var(--font-mono); font-size: 13px; color: var(--ink-600); }
  .meta { font-size: 11px; color: var(--ink-400); }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="code">T7KM2P</div>
    <div class="meta" style="margin-top:8px">6-stelliger Einladungscode</div>
  </div>
  <div class="stack">
    <div class="ts">10.02. · 14:02 — Anfrage gesendet</div>
    <div class="ts">10.02. · 14:07 — Oma Anna: übernimmt</div>
    <div class="ts">11.02. · 08:31 — bestätigt · synchronisiert</div>
  </div>
</div>
</body>
</html>
