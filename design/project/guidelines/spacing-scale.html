<!-- @dsCard group="Spacing" viewport="700x210" name="Spacing-Skala" subtitle="4px-Basis (4–96) — Screens padden 16–20, großzügiger Weißraum" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--sand-50); font-family: var(--font-body); }
  .wrap { padding: 22px 28px; display: flex; flex-direction: column; gap: 9px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .bar { height: 14px; border-radius: 4px; background: var(--wald-300); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--ink-600); width: 96px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="lbl">--space-1 · 4</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="lbl">--space-2 · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="lbl">--space-3 · 12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="lbl">--space-4 · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="lbl">--space-5 · 20</span><span class="bar" style="width:20px"></span></div>
  <div class="row"><span class="lbl">--space-6 · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="lbl">--space-8 · 32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="lbl">--space-12 · 48</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="lbl">--space-16 · 64</span><span class="bar" style="width:64px"></span></div>
</div>
</body>
</html>
