<!-- @dsCard group="Spacing" viewport="700x170" name="Motion & Zustände" subtitle="Langsam & beruhigend — default 200ms, Sheets 320ms · press 0.8, disabled 0.4" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--sand-50); font-family: var(--font-body); color: var(--ink-900); }
  .wrap { padding: 22px 28px; display: flex; gap: 16px; }
  .col { flex: 1; background: var(--sand-0); border: 1px solid var(--sand-200); border-radius: 16px; padding: 14px 16px; }
  .k { font-size: 12px; color: var(--ink-400); }
  .v { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-900); margin-top: 4px; }
  .chips { display: flex; gap: 8px; margin-top: 10px; }
  .chip { height: 34px; border-radius: 999px; background: var(--wald-700); color: #fff; font-size: 12px; font-weight: 600; display: flex; align-items: center; padding: 0 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="col">
    <div class="k">Default-Übergang</div>
    <div class="v">200ms cubic-bezier(.32,.72,0,1)</div>
    <div class="k" style="margin-top:12px">Sheets</div>
    <div class="v">320ms cubic-bezier(.16,1,.3,1)</div>
    <div class="k" style="margin-top:12px">Keine Bounces · keine Loops · kein Countdown</div>
  </div>
  <div class="col">
    <div class="k">Interaktions-Zustände</div>
    <div class="chips">
      <span class="chip">Normal</span>
      <span class="chip" style="opacity:.8">Press · .8</span>
      <span class="chip" style="opacity:.4">Disabled · .4</span>
    </div>
    <div class="k" style="margin-top:14px">Backdrop</div>
    <div class="v">rgba(42,39,33,.32) · kein Blur</div>
  </div>
</div>
</body>
</html>
