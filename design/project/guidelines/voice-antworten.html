<!-- @dsCard group="Brand" viewport="700x180" name="Die drei Antworten" subtitle="Bill Eddy: Bestätigen / Gegenvorschlag / Später — nie „Ablehnen", nie Rot" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--sand-50); font-family: var(--font-body); color: var(--ink-900); }
  .wrap { padding: 22px 28px; }
  .q { font-family: var(--font-heading); font-weight: 600; font-size: 18px; margin: 0 0 14px; }
  .btns { display: flex; gap: 10px; }
  .b { flex: 1; height: 48px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
  .p { background: var(--wald-700); color: #fff; }
  .s { background: var(--sand-100); color: var(--ink-900); }
  .t { background: transparent; color: var(--ink-600); }
  .note { font-size: 12px; color: var(--ink-400); margin-top: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <p class="q">Markus möchte den 15. Februar tauschen.</p>
  <div class="btns">
    <div class="b p">Bestätigen</div>
    <div class="b s">Gegenvorschlag</div>
    <div class="b t">Später</div>
  </div>
  <div class="note">„Später" schafft emotionalen Raum statt Ablehnung. Kein „Ablehnen", kein Alarmrot, kein Urteil.</div>
</div>
</body>
</html>
