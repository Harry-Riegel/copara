<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--sand-50); font-family: var(--font-heading); color: var(--ink-900); }
  .wrap { padding: 22px 28px; display: flex; flex-direction: column; gap: 12px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-400); width: 118px; flex-shrink: 0; }
  .d { font-weight: 700; font-size: 36px; letter-spacing: -.01em; line-height: 1.1; }
  .h1 { font-weight: 600; font-size: 28px; letter-spacing: -.01em; }
  .h2 { font-weight: 600; font-size: 22px; }
  .h3 { font-weight: 600; font-size: 18px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="line"><span class="meta">display · 700 · 36</span><span class="d">Getrennt und trotzdem zusammen</span></div>
  <div class="line"><span class="meta">h1 · 600 · 28</span><span class="h1">Zwei Dinge brauchen dich.</span></div>
  <div class="line"><span class="meta">h2 · 600 · 22</span><span class="h2">Wer übernimmt den 28. Februar?</span></div>
  <div class="line"><span class="meta">h3 · 600 · 18</span><span class="h3">Als Nächstes — vereinbart</span></div>
</div>
</body>
</html>
