<!DOCTYPE html>
<html lang="de">
<head>

<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--sand-50); font-family: var(--font-body); }
  .wrap { padding: 24px 28px; display: flex; flex-direction: column; gap: 18px; }

  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 58px; }
  .lbl { font-size: 10px; color: var(--ink-400); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Icon } = window.CoparaDesignSystem_e5ed8c;
  const names = ['house','list-checks','calendar','users','plus','arrow-left-right','crown','eye','map-pin','clock','send','bell','user-plus','shield','heart-handshake','check'];
  ReactDOM.createRoot(document.getElementById('root')).render(
    <div className="wrap">
      <div className="row">
        {names.slice(0,8).map(n => (
          <div className="cell" key={n}><Icon name={n} size={24} color="var(--ink-900)" /><span className="lbl">{n}</span></div>
        ))}
      </div>
      <div className="row">
        {names.slice(8).map(n => (
          <div className="cell" key={n}><Icon name={n} size={24} color="var(--wald-700)" /><span className="lbl">{n}</span></div>
        ))}
      </div>
    </div>
  );
</script>
</body>
</html>
